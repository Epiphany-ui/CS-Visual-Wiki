server:
  port: 8080
  servlet:
    context-path: /  # API 统一前缀 /api/v1/，由 Controller 层 RequestMapping 指定

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/manim_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: lls20050506@
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 20
      thread-name-prefix: manim-async-

# MyBatis-Plus 配置（使用 @Mapper 注解，无需 XML）
mybatis-plus:
  type-aliases-package: com.manim.pojo
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc / Swagger 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Python AI 服务地址
manim:
  ai:
    base-url: http://localhost:8000
    generate-endpoint: /generate
    connect-timeout: 5000
    read-timeout: 180000

# JWT 配置
jwt:
  secret: ManimAI2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!!
  expiration: 86400000
