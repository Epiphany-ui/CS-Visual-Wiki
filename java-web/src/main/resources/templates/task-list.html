<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史任务 - Manim 动画生成系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎬 Manim 动画生成</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link active" href="/tasks">历史任务</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">📋 历史任务列表</h4>
                <a href="/" class="btn btn-light btn-sm">➕ 新建任务</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>需求描述</th>
                                <th>状态</th>
                                <th>重试次数</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="taskTableBody">
                            <tr id="emptyRow">
                                <td colspan="6" class="text-center text-muted py-4">
                                    ⏳ 加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 任务状态映射
        const STATUS_MAP = {
            0: { text: '等待中', class: 'bg-secondary' },
            1: { text: '生成中', class: 'bg-primary' },
            2: { text: '成功', class: 'bg-success' },
            3: { text: '失败', class: 'bg-danger' }
        };

        async function loadTasks() {
            try {
                const resp = await fetch('/api/task/list');
                const result = await resp.json();

                const tbody = document.getElementById('taskTableBody');

                if (result.code !== 200 || !result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无任务记录</td></tr>';
                    return;
                }

                tbody.innerHTML = result.data.map(task => {
                    const st = STATUS_MAP[task.status] || { text: '未知', class: 'bg-dark' };
                    const desc = task.userInput ? (task.userInput.length > 50 ? task.userInput.substring(0, 50) + '...' : task.userInput) : '-';
                    return `<tr>
                        <td>${task.id}</td>
                        <td title="${task.userInput || ''}">${desc}</td>
                        <td><span class="badge ${st.class}">${st.text}</span></td>
                        <td>${task.tryCount != null ? task.tryCount : 0}</td>
                        <td>${task.createTime || '-'}</td>
                        <td><a href="/task/${task.id}" class="btn btn-outline-primary btn-sm">查看详情</a></td>
                    </tr>`;
                }).join('');
            } catch (err) {
                document.getElementById('taskTableBody').innerHTML =
                    '<tr><td colspan="6" class="text-center text-danger py-4">❌ 加载失败：' + err.message + '</td></tr>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
