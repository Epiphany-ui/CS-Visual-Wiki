<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manim 动画生成系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎬 Manim 动画生成</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/tasks">历史任务</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">📝 输入动画需求</h4>
                    </div>
                    <div class="card-body">
                        <form id="submitForm">
                            <div class="mb-3">
                                <label for="userInput" class="form-label">动画需求描述</label>
                                <textarea class="form-control" id="userInput" rows="6"
                                          placeholder="例如：绘制一个蓝色的圆形，然后让它旋转一圈，最后变成一个红色的正方形"
                                          required></textarea>
                                <div class="form-text">用自然语言描述你想要的数学动画效果</div>
                            </div>

                            <div class="mb-3">
                                <label for="maxRetry" class="form-label">最大重试次数</label>
                                <input type="number" class="form-control" id="maxRetry"
                                       value="3" min="1" max="10" style="max-width: 120px;">
                                <div class="form-text">默认 3 次，渲染失败后自动重试</div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                                🚀 开始生成
                            </button>
                        </form>

                        <!-- 提交结果提示 -->
                        <div id="resultAlert" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('submitForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const userInput = document.getElementById('userInput').value.trim();
            const maxRetry = document.getElementById('maxRetry').value || 3;
            const submitBtn = document.getElementById('submitBtn');
            const resultAlert = document.getElementById('resultAlert');

            if (!userInput) {
                alert('请输入动画需求描述');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ 提交中...';
            resultAlert.className = 'mt-3 d-none';

            try {
                const params = new URLSearchParams();
                params.append('userInput', userInput);
                params.append('maxRetry', maxRetry);

                const resp = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const result = await resp.json();

                if (result.code === 200) {
                    // 跳转到任务详情页，前端轮询查看进度
                    window.location.href = '/task/' + result.data;
                } else {
                    resultAlert.className = 'mt-3 alert alert-danger';
                    resultAlert.textContent = '提交失败：' + result.msg;
                }
            } catch (err) {
                resultAlert.className = 'mt-3 alert alert-danger';
                resultAlert.textContent = '网络错误：' + err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🚀 开始生成';
            }
        });
    </script>
</body>
</html>
