# CS-Visual-Learn 完整容器编排
# 使用方式：
#   docker-compose -f Docker/docker-compose.yml --env-file .env up -d
# 首次需将 Docker/.env.example 复制为项目根目录 .env 并填入配置

version: "3.8"

x-common-python: &common-python
  build:
    context: ..
    dockerfile: Docker/python.Dockerfile
  env_file:
    - ../.env
  environment:
    - REDIS_URL=redis://redis:6379/0
  volumes:
    - outputs:/app/outputs
    - ../ai-service/wiki_data:/app/wiki_data
    - ../ai-service/templates:/app/templates
    - ../ai-service/prompts:/app/prompts
    - ../ai-service/kb_data:/app/kb_data
  networks:
    - cs-visual-net
  restart: unless-stopped

services:
  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: cs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cs-visual-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: cs-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-manim_ai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - cs-visual-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==================== Python FastAPI ====================
  python-api:
    <<: *common-python
    container_name: cs-python-api
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL_NAME=${DEEPSEEK_MODEL_NAME:-deepseek-v4-flash}
      - REDIS_URL=redis://redis:6379/0
      - RENDER_QUALITY_FLAG=${RENDER_QUALITY_FLAG:--qm}
      - RENDER_TIMEOUT=${RENDER_TIMEOUT:-120}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  # ==================== Celery Worker ====================
  celery-worker:
    <<: *common-python
    container_name: cs-celery-worker
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL_NAME=${DEEPSEEK_MODEL_NAME:-deepseek-v4-flash}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info

  # ==================== Java Spring Boot ====================
  java-backend:
    build:
      context: ..
      dockerfile: Docker/java.Dockerfile
    container_name: cs-java-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE:-manim_ai}
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - PYTHON_API_URL=http://python-api:8000
      - JWT_SECRET=${JWT_SECRET:-ManimAI2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!!}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cs-visual-net
    restart: unless-stopped

  # ==================== Vue Frontend (Nginx) ====================
  frontend:
    build:
      context: ..
      dockerfile: Docker/frontend.Dockerfile
    container_name: cs-frontend
    ports:
      - "80:80"
    depends_on:
      - python-api
      - java-backend
    networks:
      - cs-visual-net
    restart: unless-stopped

networks:
  cs-visual-net:
    driver: bridge

volumes:
  redis_data:
  mysql_data:
  outputs:
